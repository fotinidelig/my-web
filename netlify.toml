# Netlify Configuration for byfotini.com
# Minimal configuration to get deployment working

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_ENV = "production"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
